# Build a self-contained Windows release on a tag push, then attach the
# zip to a GitHub Release. Triggered by tags of the form `v0.1.0`.
#
# Uses tools/build-release.ps1 so local builds and CI produce the same
# bundle. The MSVC runtime is statically linked via +crt-static
# (.cargo/config.toml), so the resulting .exe runs on any Win10+ machine
# without the Visual C++ redistributable installed.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (without leading v); leave blank to read from Cargo.toml'
        required: false
        default: ''

jobs:
  build-windows-x64:
    name: Build windows-x64 zip
    runs-on: windows-latest

    permissions:
      contents: write  # required by softprops/action-gh-release for tag builds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + msvc target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ runner.os }}-msvc

      - name: Build release bundle
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
            pwsh -File tools/build-release.ps1
          } else {
            pwsh -File tools/build-release.ps1 -Version $version
          }

      - name: Upload artifacts (zip bundle + standalone exe)
        uses: actions/upload-artifact@v4
        with:
          name: arksa-server-maintainer-windows-x64
          path: |
            dist/arksa-server-maintainer-v*.zip
            dist/arksa-gui-v*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Two artifacts per release:
          #   - the .zip bundle (full install: exe + assets/ + run.bat)
          #   - the standalone .exe (in-place upgrade; user keeps their
          #     existing assets/)
          files: |
            dist/arksa-server-maintainer-v*.zip
            dist/arksa-gui-v*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
